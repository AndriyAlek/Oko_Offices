<!DOCTYPE html>
<html lang="uk"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Карта · Оренда офісу</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#f8f9fc;--s:#ffffff;--b:#e5e7ef;--b2:#d1d5e0;
  --acc:#2563eb;--acc2:#0ea5e9;--txt:#1a1d2e;--mut:#6b7280;
  --good:#16a34a;--warn:#d97706;--bad:#dc2626;
  --acc-bg:#eff6ff;--good-bg:#f0fdf4;--bad-bg:#fef2f2;
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}
a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}
nav{background:var(--s);border-bottom:1px solid var(--b);padding:12px 28px;display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{font-weight:800;font-size:13px;color:var(--acc);margin-right:12px;letter-spacing:-.02em}
nav a{font-size:13px;color:var(--mut);font-weight:500;padding:6px 12px;border-radius:6px}
nav a:hover,nav a.on{background:var(--acc-bg);color:var(--acc);text-decoration:none}
.wrap{max-width:1440px;margin:0 auto;padding:28px 24px}
h1{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:-.03em}
.sub{color:var(--mut);font-size:13px;margin-bottom:22px}
.filters{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.fb{padding:5px 13px;font-size:12px;font-weight:600;background:var(--s);border:1px solid var(--b);color:var(--mut);cursor:pointer;border-radius:20px;transition:all .15s}
.fb.on,.fb:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:18px;position:relative;transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:var(--acc)}
.card.hidden{display:none}
.cn{position:absolute;top:12px;right:14px;font-size:10px;font-weight:700;color:var(--mut);background:var(--bg);padding:2px 7px;border-radius:10px;border:1px solid var(--b)}
.cs{font-size:14px;font-weight:700;margin-bottom:3px;padding-right:42px;line-height:1.3}
.cm{font-size:11px;color:var(--mut);margin-bottom:14px}
.ps{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.p{background:var(--bg);padding:8px 10px;border-radius:6px;border:1px solid var(--b)}
.pl{font-size:10px;color:var(--mut);margin-bottom:1px;font-weight:500}
.pv{font-size:13px;font-weight:700}
.br{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bl{font-size:11px;color:var(--mut);width:110px;flex-shrink:0}
.bw{flex:1;height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .4s}
.bv{font-size:11px;font-weight:700;width:40px;text-align:right;flex-shrink:0}
.cf{display:flex;gap:8px;margin-top:auto;padding-top:14px;border-top:1px solid var(--b)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;border:none;transition:all .15s;white-space:nowrap;text-decoration:none}
.bo{background:var(--bg);border:1px solid var(--b);color:var(--mut)}.bo:hover{border-color:var(--acc);color:var(--acc);text-decoration:none}
.ba{background:var(--acc);color:#fff}.ba:hover{background:#1d4ed8;text-decoration:none}
/* Detail */
.dh{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:26px;margin-bottom:20px;border-left:4px solid var(--acc)}
.dt{font-size:20px;font-weight:800;margin-bottom:3px;letter-spacing:-.03em}
.ds{color:var(--mut);font-size:13px;margin-bottom:18px}
.dp{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.db{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:680px){.db{grid-template-columns:1fr}}
.sec{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:20px}
.st{font-size:11px;font-weight:700;color:var(--acc);letter-spacing:.05em;margin-bottom:14px;text-transform:uppercase}
.ck{display:flex;flex-direction:column}
.ci{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:7px 0;border-bottom:1px solid var(--b)}
.ci:last-child{border-bottom:none}
.cii{font-size:14px;width:20px;text-align:center;flex-shrink:0;margin-top:1px}
.cy{color:var(--good)}.cn2{color:var(--bad)}
.ci-text{flex:1}
.ci-note{font-size:11px;color:var(--mut);margin-top:2px;background:var(--bg);padding:2px 7px;border-radius:4px;display:inline-block}
.cmt{background:#fefce8;border-left:3px solid #eab308;padding:10px 14px;font-size:13px;margin-top:14px;border-radius:0 6px 6px 0}
.back{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--mut);margin-bottom:18px;padding:6px 12px;border-radius:6px;border:1px solid var(--b);background:var(--s)}
.back:hover{color:var(--acc);text-decoration:none;border-color:var(--acc)}
/* Compare */
.tw{overflow-x:auto;border:1px solid var(--b);border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
thead tr{border-bottom:2px solid var(--b)}
th{padding:10px 12px;text-align:left;font-size:10px;color:var(--mut);font-weight:700;letter-spacing:.05em;white-space:nowrap;background:var(--bg)}
td{padding:8px 12px;border-bottom:1px solid var(--b);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.rl{color:var(--mut);font-size:11px;min-width:170px;font-weight:500}
.tok{color:var(--good);font-weight:700}.tno{color:var(--bad)}
.tn{font-size:11px;color:var(--acc);font-weight:700;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sh td{font-size:10px;font-weight:700;color:var(--acc);letter-spacing:.06em;background:var(--acc-bg);padding:8px 12px;text-transform:uppercase}
/* Map */
#map{width:100%;height:calc(100vh - 57px)}
.tag{display:inline-block;padding:2px 8px;font-size:10px;font-weight:600;border-radius:10px;background:var(--acc-bg);color:var(--acc);margin-left:6px}

const MARKERS = {};  // id -> leaflet marker

const map = L.map('map').setView([50.448, 30.523], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {attribution:'© OpenStreetMap contributors', maxZoom:19}).addTo(map);

L.marker([50.4298, 30.5148], {icon: L.divIcon({
  html:'<div style="background:#2563eb;color:#fff;font-size:9px;font-weight:700;padding:4px 8px;border-radius:4px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.2)">МЦ ІНГО</div>',
  className:'', iconAnchor:[30,20]
})}).addTo(map).bindPopup('<b>МЦ Інго</b><br>Велика Васильківська 54Б');

const PAL=['#2563eb','#059669','#dc2626','#d97706','#7c3aed','#0891b2','#be185d','#65a30d','#c2410c','#0369a1',
           '#4f46e5','#047857','#b91c1c','#b45309','#6d28d9'];

function addMarker(o, i, lat, lng) {
  const c = PAL[i % PAL.length];
  const pct = o.req_max ? Math.round(o.req / o.req_max * 100) : 0;
  const cc = pct>=80 ? '#16a34a' : pct>=50 ? '#d97706' : '#dc2626';
  const icon = L.divIcon({
    html: `<div style="background:${c};color:#fff;font-size:10px;font-weight:800;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.25);border:2px solid #fff">${o.num}</div>`,
    className:'', iconAnchor:[16,16]
  });
  const cmt = o.comment ? `<div style="margin-top:6px;font-size:11px;color:#6b7280;font-style:italic">${o.comment}</div>` : '';
  const m = L.marker([lat, lng], {icon}).addTo(map).bindPopup(`
    <div style="font-family:system-ui,sans-serif;min-width:200px;padding:4px">
      <div style="font-weight:700;font-size:13px;margin-bottom:3px">#${o.num} ${o.street}</div>
      <div style="font-size:11px;color:#6b7280;margin-bottom:8px">${o.district}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;margin-bottom:8px">
        <div>&#128210; <b>${o.area||'&#8212;'} &#1084;&#178;</b></div>
        <div>&#128176; <b>${o.total ? o.total+' $':'&#8212;'}</b></div>
      </div>
      <div style="font-size:12px">&#1054;&#1073;&#1086;&#1074;'&#1103;&#1079;&#1082;&#1086;&#1074;&#1110;: <b style="color:${cc}">${o.req}/${o.req_max}</b> &nbsp; &#1044;&#1086;&#1076;&#1072;&#1090;&#1082;&#1086;&#1074;&#1110;: <b>${o.ext}</b></div>
      ${cmt}
      <div style="margin-top:10px"><a href="objects/${o.id}.html" style="color:#2563eb;font-size:12px;font-weight:600">&#1044;&#1077;&#1090;&#1072;&#1083;&#1100;&#1085;&#1086; &rarr;</a></div>
    </div>`);
  MARKERS[o.id] = m;
  return m;
}

// Фільтр
function applyMapFilter() {
  const dist  = document.getElementById('mf-dist').value;
  const area  = document.getElementById('mf-area').value;
  OBJ.forEach(o => {
    const m = MARKERS[o.id];
    if (!m) return;
    let an = parseFloat(o.area) || 0;
    const distOk = !dist || o.district === dist;
    const areaOk = !area || (area==='small'&&an<400)||(area==='mid'&&an>=400&&an<600)||(area==='big'&&an>=600);
    if (distOk && areaOk) { m.addTo(map); } else { map.removeLayer(m); }
  });
}

// Показати всі маркери
function showAllMarkers() {
  OBJ.forEach((o,i) => {
    if (!MARKERS[o.id]) {
      const coords = o.coords || geoCache[o.id];
      if (coords) addMarker(o, i, coords[0], coords[1]);
    } else {
      MARKERS[o.id].addTo(map);
    }
  });
  const all = OBJ.map(o => o.coords || geoCache[o.id]).filter(Boolean);
  if (all.length) map.fitBounds(all, {padding:[40,40]});
  document.getElementById('show-all-btn').style.display = 'none';
  applyMapFilter(); // застосувати активні фільтри
}

// localStorage кеш координат
const GEO_LS_KEY = 'geo_cache_v1';
function loadGeoCache() { try { return JSON.parse(localStorage.getItem(GEO_LS_KEY)||'{}'); } catch(e) { return {}; } }
function saveGeoCache(c) { try { localStorage.setItem(GEO_LS_KEY, JSON.stringify(c)); } catch(e) {} }

async function geocodeBrowser(q) {
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q+', Kyiv, Ukraine')+'&format=json&limit=1', {headers:{'Accept-Language':'uk'}});
    const d = await r.json();
    if (d.length) return [+d[0].lat, +d[0].lon];
  } catch(e) {}
  return null;
}

const allCoords = [];
const geoCache = loadGeoCache();

// Фільтр по номеру
function filterByNum() {
  const val = document.getElementById('mf-num').value.trim();
  const num = parseInt(val);
  if (!val) { showAllMarkers(); document.getElementById('show-all-btn').style.display='none'; return; }
  OBJ.forEach((o,i) => {
    if (o.num === num) {
      if (!MARKERS[o.id]) {
        const c = o.coords || geoCache[o.id];
        if (c) { addMarker(o,i,c[0],c[1]); map.setView(c,16); setTimeout(()=>MARKERS[o.id]&&MARKERS[o.id].openPopup(),300); }
      } else {
        MARKERS[o.id].addTo(map);
        map.setView(MARKERS[o.id].getLatLng(),16);
        setTimeout(()=>MARKERS[o.id].openPopup(),300);
      }
    } else {
      if (MARKERS[o.id]) map.removeLayer(MARKERS[o.id]);
    }
  });
  document.getElementById('show-all-btn').style.display = 'block';
}

  const hash = window.location.hash.slice(1);

  // 1. Додаємо всі маркери з координат (вбудованих або кешу)
  for (let i=0; i<OBJ.length; i++) {
    const o = OBJ[i];
    const coords = o.coords || geoCache[o.id];
    if (coords) {
      addMarker(o, i, coords[0], coords[1]);
      allCoords.push(coords);
    }
  }

  // 2. Якщо прийшли з деталей — ховаємо все крім потрібного
  if (hash) {
    document.getElementById('show-all-btn').style.display = 'block';
    OBJ.forEach(o => {
      if (o.id !== hash && MARKERS[o.id]) map.removeLayer(MARKERS[o.id]);
    });
    if (MARKERS[hash]) {
      map.setView(MARKERS[hash].getLatLng(), 16);
      setTimeout(() => MARKERS[hash].openPopup(), 400);
    } else {
      // Координат немає в кеші — заповнимо поле номера щоб юзер бачив
      const obj = OBJ.find(o => o.id === hash);
      if (obj) document.getElementById('mf-num').value = obj.num;
      map.setView([50.448, 30.523], 12);
    }
  } else {
    if (allCoords.length) map.fitBounds(allCoords, {padding:[40,40]});
  }

  // 3. Геокодуємо ТІЛЬКИ нові (яких немає ні в coords ні в geoCache)
  const needGeo = OBJ.filter(o => !o.coords && !geoCache[o.id] && o.street && !o.street.startsWith('http'));
  if (needGeo.length === 0) return; // нічого нового — виходимо

  document.getElementById('geo-banner').style.display = 'flex';
  document.getElementById('geo-total').textContent = needGeo.length;
  let done = 0;
  for (let i=0; i<OBJ.length; i++) {
    const o = OBJ[i];
    if (!o.coords && !geoCache[o.id] && o.street && !o.street.startsWith('http')) {
      document.getElementById('geo-current').textContent = o.street.substring(0,35);
      const coords = await geocodeBrowser(o.street);
      done++;
      document.getElementById('geo-done').textContent = done;
      if (coords) {
        geoCache[o.id] = coords;
        saveGeoCache(geoCache);
        // Додаємо маркер тільки якщо він має бути видимий
        const isTarget = hash && o.id === hash;
        const noFilter = !hash;
        if (isTarget || noFilter) {
          addMarker(o, i, coords[0], coords[1]);
          if (isTarget) { map.setView(coords, 16); setTimeout(()=>MARKERS[o.id]&&MARKERS[o.id].openPopup(),300); }
          else { allCoords.push(coords); map.fitBounds(allCoords,{padding:[40,40]}); }
        }
      }
      await new Promise(r => setTimeout(r, 1100));
    }
  }
  document.getElementById('geo-banner').style.display = 'none';
});
</script></body></html>
